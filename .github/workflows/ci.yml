name: CI Pipeline

permissions:
  contents: read

on:
  pull_request:
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
  push:
    branches:
      - main
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
  workflow_dispatch: {}

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Core job: lint, type-check, and unit tests (no Evo2 required) ──
  lint-and-test:
    name: Lint, type-check, and core tests
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        shell: bash -l {0}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Miniforge (Conda + Mamba)
        uses: conda-incubator/setup-miniconda@v4
        with:
          auto-update-conda: true
          miniforge-version: latest
          activate-environment: baio
          use-mamba: true
          auto-activate: false

      - name: Cache conda env
        id: cache-env
        uses: actions/cache@v5
        with:
          path: ${{ env.CONDA }}/envs/baio
          key: conda-env-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('environment.yml') }}

      - name: Create or update env
        if: steps.cache-env.outputs.cache-hit != 'true'
        run: mamba env update -n baio -f environment.yml

      - name: Show tool versions
        run: |
          python --version
          which python
          pip --version || true
          conda info
          conda list | head -n 50 || true

      - name: Install CI tools
        run: |
          python -m pip install --upgrade pip
          pip install pre-commit mypy pytest pytest-cov build

      - name: Pre-commit (formatting & lint)
        run: pre-commit run --all-files

      - name: Type check (mypy)
        run: |
          mypy metaseq data_processing prompting binary_classifiers

      - name: Run core unit tests (no Evo2)
        env:
          PYTHONWARNINGS: default
        run: |
          pytest --ignore=tests/test_evo2_embedder.py \
                --cov=metaseq \
                --cov=data_processing \
                --cov=prompting \
                --cov=binary_classifiers \
                --cov-fail-under=80 \
                --cov-report=term-missing \
                --cov-report=xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage.xml

      - name: Verify packaging (pyproject)
        if: hashFiles('pyproject.toml') != ''
        run: |
          python -m build
          ls -lah dist

  # ── Optional Evo2 job: only runs on evo2 label or manual trigger ──
  test-evo2:
    name: Evo2 integration tests
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: |
      contains(github.event.pull_request.labels.*.name, 'evo2') ||
      github.event_name == 'workflow_dispatch'
    defaults:
      run:
        shell: bash -l {0}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Miniforge (Conda + Mamba)
        uses: conda-incubator/setup-miniconda@v4
        with:
          auto-update-conda: true
          miniforge-version: latest
          activate-environment: baio
          use-mamba: true
          auto-activate: false

      - name: Cache conda env
        id: cache-env
        uses: actions/cache@v5
        with:
          path: ${{ env.CONDA }}/envs/baio
          key: conda-env-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('environment.yml') }}

      - name: Create or update env
        if: steps.cache-env.outputs.cache-hit != 'true'
        run: mamba env update -n baio -f environment.yml

      - name: Install Evo2 dependencies
        run: |
          pip install -e ".[evo2]"

      - name: Run Evo2 tests
        env:
          PYTHONWARNINGS: default
        run: |
          pytest tests/test_evo2_embedder.py -v
