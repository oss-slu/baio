repos:
  - repo: https://github.com/psf/black
    rev: 26.1.0
    hooks:
      - id: black

  - repo: https://github.com/pycqa/flake8
    rev: 7.3.0
    hooks:
      - id: flake8
        additional_dependencies:
          - flake8-pyproject

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.19.1
    hooks:
      - id: mypy
        args:
          [
            "--install-types",
            "--non-interactive",
            "metaseq",
            "data_processing",
            "prompting",
            "binary_classifiers",
          ]
        pass_filenames: false
        additional_dependencies:
          - joblib>=1.3
          - pandas-stubs==2.3.2.250926
          - scikit-learn==1.5.*
          - types-requests>=2.31.0
          - types-PyYAML>=6.0
          - types-urllib3
