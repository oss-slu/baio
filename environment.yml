name: baio
channels:
  - conda-forge
  - bioconda
  - defaults

dependencies:
  # === Core ===
  - python>=3.12,<3.13
  - uvicorn
  - requests
  - python-dotenv>=1.0
  - click
  - rich
  - jsonschema
  - python-json-logger>=3.0
  - pyyaml>=6.0

  # === Numeric / Scientific stack ===
  - numpy=2.2
  - scipy=1.14
  - numba=0.61
  - llvmlite=0.44
  - pandas=2.2
  - matplotlib=3.9
  - seaborn=0.13
  - plotly
  - joblib>=1.3

  # === ML / AI ===
  - scikit-learn=1.5
  - pytorch=2.5.1

  # === Bioinformatics / Clustering ===
  - biopython>=1.85
  - hdbscan=0.8.39
  - umap-learn=0.5.7

  # === I/O / Storage ===
  - pyarrow>=17.0
  - h5py
  - zarr

  # === Jupyter / Notebook ===
  - jupyter
  - jupyterlab
  - ipywidgets
  - ipykernel>=6.0

  # === Dev / QA ===
  - pytest>=8.0
  - pytest-cov>=4.1
  - pytest-mock>=3.12
  - pytest-asyncio>=0.23
  - black>=24.0
  - flake8>=7.0
  - isort>=5.13
  - mypy>=1.10
  - watchdog>=3.0

  # === Pip-only packages ===
  - pip
  - pip:
      # runtime / HuggingFace
      - transformers==4.56.1
      - tokenizers==0.22.0
      - accelerate>=0.30
      - datasets>=2.19
      - fastapi>=0.115.0
      - sqlalchemy>=2.0

      # dev / profiling / type stubs
      - line-profiler>=4.1
      - memory-profiler>=0.61
      - pandas-stubs==2.3.2.250926
      - types-requests>=2.31.0
      - types-PyYAML>=6.0
      - types-jsonschema
      - pre-commit>=3.3